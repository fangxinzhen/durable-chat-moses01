<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<title>Moses's Chat!</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- 引入 Tailwind CSS 构建现代 UI 替代原有的 Skeleton CSS -->
		<script src="https://cdn.tailwindcss.com"></script>

		<!-- Favicon -->
		<link rel="icon" type="image/ico" href="favicon.ico" />
		
		<!-- 核心逻辑脚本 (原封不动，绝对不能动) -->
		<script src="/dist/index.js" type="module"></script>
		
		<style>
			/* 滚动条美化 */
			::-webkit-scrollbar { width: 6px; }
			::-webkit-scrollbar-track { background: transparent; }
			::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
			::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
		</style>
	</head>
	<body class="bg-slate-50 text-slate-800 flex flex-col h-screen overflow-hidden md:flex-row">

		<!-- 左侧：Moses 专属项目说明面板 (对应原 one-third column) -->
		<aside class="w-full md:w-[350px] bg-gradient-to-br from-[#1e1b4b] via-[#0f172a] to-[#1e1b4b] text-white p-8 flex flex-col justify-between shrink-0 border-b md:border-b-0 md:border-r border-slate-800/80">
			<div class="space-y-6">
				<!-- 可爱的小猫咪图标与标题 -->
				<div class="flex items-center space-x-3">
					<div class="w-11 h-11 rounded-2xl bg-gradient-to-tr from-pink-400 via-purple-400 to-cyan-400 flex items-center justify-center text-white font-black text-2xl shadow-lg shadow-purple-500/20 animate-[pulse_3s_infinite]">
						ฅ
					</div>
					<div>
						<h2 class="text-lg font-bold tracking-wide">Moses's Space</h2>
						<span class="text-xs text-pink-300 font-mono tracking-widest uppercase">Cute Chat Hub</span>
					</div>
				</div>

				<!-- 原文案精美渲染 -->
				<div class="space-y-4 pt-4">
					<h4 class="text-2xl font-black tracking-tight leading-snug text-transparent bg-clip-text bg-gradient-to-r from-white via-pink-100 to-cyan-200">
						<b>Chat</b>, powered by Durable Objects
					</h4>
					<p class="text-sm text-slate-300 leading-relaxed">
						This chat room is hosted in a single Durable Object, running in one
						process in one machine in one location, very close to the users.
					</p>
					<p class="text-xs text-slate-400 italic">
						“共享聊天室，聊天不被平台束缚，无拘无束的开聊吧。”
					</p>
				</div>
			</div>

			<!-- 底部版权信息 -->
			<div class="text-xs text-slate-500 pt-6 border-t border-slate-800/80 flex items-center justify-between">
				<span>Powered by Cloudflare</span>
				<span>Moses © 2026</span>
			</div>
		</aside>

		<!-- 右侧：核心聊天交互区域 (对应原 two-thirds column) -->
		<!-- /dist/index.js 挂载的核心渲染节点，容器直接贴满右侧屏幕 -->
		<main class="flex-1 h-full bg-white relative overflow-hidden" id="root">
			<!-- 您的 React/JS 聊天应用会在这里自动渲染出来 -->
		</main>

	</body>
</html>
