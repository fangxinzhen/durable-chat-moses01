<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <style>
        /* 基础极简样式，仅做视觉美化 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 90%;
            background: #ffffff;
            padding: 40px 30px 30px 30px; /* 稍微微调了内边距 */
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #eef2f6;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            color: #1a1a1a;
            margin: 0 0 10px 0;
        }
        p {
            font-size: 16px;
            color: #666;
            margin: 0 0 24px 0;
        }
        /* 按钮仅做样式渲染，不改变您原有的标签属性与事件逻辑 */
        .btn {
            display: inline-block;
            background-color: #0070f3;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s ease;
            border: none;
            cursor: pointer;
            margin-bottom: 30px; /* 为底部的版权信息留出空间 */
        }
        .btn:hover {
            background-color: #0051cb;
        }
        /* 版权信息样式 */
        .copyright {
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. 头像/图片渲染 -->
        <img class="profile-img" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200&auto=format&fit=crop" alt="Avatar">
        
        <!-- 2. 文本内容渲染 -->
        <h1>欢迎来到我的主页</h1>
        <p>共享聊天室，聊天不被平台束缚，无拘无束的开聊吧。</p>
        
        <!-- 3. 原有逻辑按钮 -->
        <button class="btn" onclick="yourOriginalLogic()">开始体验</button>
        
        <!-- 4. 版权所有声明 -->
        <p class="copyright">© 2026 Moses. All rights reserved.</p>
    </div>

</body>
</html>
