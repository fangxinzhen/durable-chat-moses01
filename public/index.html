<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Moses's Chat!</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- 1. 必须保留的原版骨架与样式文件，保证右侧 JS 渲染完美 -->
		<link rel="stylesheet" href="css/normalize.css" />
		<link rel="stylesheet" href="css/skeleton.css" />
		<link rel="stylesheet" href="styles.css" />

		<!-- 2. 引入 Tailwind CSS 作为视觉辅助美化 -->
		<script src="https://cdn.tailwindcss.com"></script>

		<!-- Favicon -->
		<link rel="icon" type="image/ico" href="favicon.ico" />
		
		<!-- 核心逻辑脚本 -->
		<script src="/dist/index.js" type="module"></script>
	</head>
	<body class="bg-[#f8f9fa] m-0 p-0 font-sans">

		<!-- 使用一个美观的主容器，并兼容原有的一侧和两侧（row）布局 -->
		<div class="container" style="width: 95%; height: 100vh; max-width: 1200px; margin: 0 auto; display: flex; align-items: center;">
			<div class="row" style="width: 100%; display: flex; align-items: center; flex-wrap: wrap;">
				
				<!-- 左侧：一格 (one-third column) 加上精致的设计 -->
				<div class="one-third column" style="padding: 30px; background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%); border-radius: 16px; color: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px;">
					<!-- 萌化的小图标 -->
					<div style="display: flex; align-items: center; margin-bottom: 20px;">
						<div style="width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(to top right, #f472b6, #c084fc, #22d3ee); display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 12px rgba(192, 132, 252, 0.3); margin-right: 12px;">
							ฅ
						</div>
						<div>
							<h5 style="margin: 0; font-weight: 700; font-size: 16px; color: #fff;">Moses's Space</h5>
							<span style="font-size: 10px; color: #f472b6; font-family: monospace; letter-spacing: 1px;">CUTE CHAT HUB</span>
						</div>
					</div>

					<h4 style="color: white; font-weight: 800; font-size: 22px; margin-bottom: 15px; line-height: 1.3;">
						<b>Chat</b>, powered by Durable Objects
					</h4>
					<p style="color: #cbd5e1; font-size: 13.5px; line-height: 1.6; margin-bottom: 15px;">
						This chat room is hosted in a single Durable Object, running in one
						process in one machine in one location, very close to the users.
					</p>
					<p style="color: #94a3b8; font-size: 11px; font-style: italic; margin-bottom: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
						“共享聊天室，聊天不被平台束缚，无拘无束的开聊吧。”
					</p>
					
					<!-- 专属版权声明 -->
					<div style="font-size: 11px; color: #64748b; display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;">
						<span>Powered by Cloudflare</span>
						<span>Moses © 2026</span>
					</div>
				</div>

				<!-- 右侧：两格 (two-thirds column)，无缝让 Skeleton 和您的原生 CSS 完美接管样式 -->
				<div class="two-thirds column" id="root" style="padding: 20px;">
					<!-- 原生 JS 脚本会在这里完美渲染出带 Skeleton 样式的输入框与聊天历史 -->
				</div>

			</div>
		</div>

	</body>
</html>
